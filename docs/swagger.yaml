openapi: 3.0.3
info:
  title: FastFood API
  version: 1.0.0
  description: API REST per progetto Full FastFood con utenti, ristoranti, menu, ordini e consegne.
servers:
  - url: http://localhost:3000/api
security:
  - bearerAuth: []
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    RegisterRequest:
      type: object
      required: [username, email, password, role]
      properties:
        username: { type: string, example: mario }
        email: { type: string, example: mario@example.com }
        password: { type: string, example: password123 }
        role: { type: string, enum: [cliente, ristoratore] }
        firstName: { type: string }
        lastName: { type: string }
        preferences:
          type: array
          items: { type: string }
    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email: { type: string }
        password: { type: string }
    Meal:
      type: object
      properties:
        name: { type: string }
        type: { type: string }
        ingredients:
          type: array
          items: { type: string }
        allergens:
          type: array
          items: { type: string }
        imageUrl: { type: string }
        basePrice: { type: number }
    Restaurant:
      type: object
      required: [name, phone, vatNumber, address, city, location]
      properties:
        name: { type: string }
        phone: { type: string }
        vatNumber: { type: string }
        address: { type: string }
        city: { type: string }
        location:
          type: object
          properties:
            lat: { type: number }
            lon: { type: number }
        menu:
          type: array
          items:
            type: object
            properties:
              meal: { type: string }
              price: { type: number }
              available: { type: boolean }
    OrderRequest:
      type: object
      required: [restaurantId, items, pickupMode]
      properties:
        restaurantId: { type: string }
        pickupMode: { type: string, enum: [restaurant, delivery] }
        deliveryAddress: { type: string }
        items:
          type: array
          items:
            type: object
            required: [mealId, quantity]
            properties:
              mealId: { type: string }
              quantity: { type: integer, minimum: 1 }
paths:
  /health:
    get:
      security: []
      summary: Verifica lo stato dell'API
      responses:
        '200': { description: API attiva }
  /auth/register:
    post:
      security: []
      summary: Registra cliente o ristoratore
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/RegisterRequest' }
      responses:
        '201': { description: Utente registrato con token JWT }
  /auth/login:
    post:
      security: []
      summary: Login utente
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/LoginRequest' }
      responses:
        '200': { description: Token JWT e profilo }
  /auth/me:
    get:
      summary: Visualizza profilo corrente
      responses:
        '200': { description: Profilo utente }
    put:
      summary: Modifica profilo corrente
      responses:
        '200': { description: Profilo aggiornato }
    delete:
      summary: Disattiva il profilo corrente
      responses:
        '204': { description: Profilo rimosso }
  /meals:
    get:
      security: []
      summary: Ricerca piatti per nome, tipologia, prezzo, ingrediente o allergia esclusa
      parameters:
        - in: query
          name: name
          schema: { type: string }
        - in: query
          name: type
          schema: { type: string }
        - in: query
          name: maxPrice
          schema: { type: number }
        - in: query
          name: ingredient
          schema: { type: string }
        - in: query
          name: allergy
          schema: { type: string }
      responses:
        '200': { description: Elenco piatti }
    post:
      summary: Crea piatto personalizzato del ristoratore
      requestBody:
        content:
          application/json:
            schema: { $ref: '#/components/schemas/Meal' }
      responses:
        '201': { description: Piatto creato }
  /meals/{id}:
    put:
      summary: Modifica piatto
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      responses:
        '200': { description: Piatto aggiornato }
    delete:
      summary: Elimina piatto personalizzato
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      responses:
        '204': { description: Piatto eliminato }
  /restaurants:
    get:
      security: []
      summary: Ricerca ristoranti per nome, luogo o piatto
      parameters:
        - in: query
          name: name
          schema: { type: string }
        - in: query
          name: city
          schema: { type: string }
        - in: query
          name: meal
          schema: { type: string }
      responses:
        '200': { description: Elenco ristoranti }
  /restaurants/{id}:
    get:
      security: []
      summary: Dettaglio ristorante con menu
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      responses:
        '200': { description: Ristorante }
  /restaurants/mine:
    put:
      summary: Crea o modifica il ristorante del ristoratore autenticato
      requestBody:
        content:
          application/json:
            schema: { $ref: '#/components/schemas/Restaurant' }
      responses:
        '201': { description: Ristorante salvato }
    delete:
      summary: Cancella il ristorante del ristoratore autenticato
      responses:
        '204': { description: Ristorante cancellato }
  /restaurants/mine/menu:
    put:
      summary: Sostituisce il menu del ristorante autenticato
      responses:
        '200': { description: Menu aggiornato }
  /restaurants/mine/stats:
    get:
      summary: Statistiche ordini e ricavi del ristorante
      responses:
        '200': { description: Statistiche }

  /users:
    get:
      summary: Visualizza clienti o ristoratori registrati
      parameters:
        - in: query
          name: role
          schema: { type: string, enum: [cliente, ristoratore] }
      responses:
        '200': { description: Utenti registrati senza password }
  /orders:
    post:
      summary: Crea ordine da cliente autenticato
      requestBody:
        content:
          application/json:
            schema: { $ref: '#/components/schemas/OrderRequest' }
      responses:
        '201': { description: Ordine creato }
  /orders/mine:
    get:
      summary: Visualizza acquisti presenti e passati del cliente
      responses:
        '200': { description: Ordini dell'utente }
  /orders/purchases:
    get:
      summary: Visualizza acquisti per ristoratore
      responses:
        '200': { description: Acquisti registrati }
  /orders/{id}/status:
    put:
      summary: Aggiorna stato ordine o conferma consegna
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                status: { type: string, enum: [ordinato, in_preparazione, in_consegna, consegnato] }
      responses:
        '200': { description: Stato aggiornato }
