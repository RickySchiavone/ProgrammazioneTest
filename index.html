<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login | Area Riservata</title>
  <style>
    :root {
      --bg-1: #0f172a;
      --bg-2: #1d4ed8;
      --card: #ffffff;
      --text: #0f172a;
      --muted: #64748b;
      --primary: #2563eb;
      --primary-hover: #1d4ed8;
      --border: #cbd5e1;
      --ring: rgba(37, 99, 235, 0.2);
      --success: #16a34a;
      font-family: "Inter", "Segoe UI", Roboto, Arial, sans-serif;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 1rem;
      color: var(--text);
      background:
        radial-gradient(circle at 10% 10%, rgba(59, 130, 246, 0.35), transparent 35%),
        radial-gradient(circle at 90% 80%, rgba(34, 197, 94, 0.25), transparent 30%),
        linear-gradient(140deg, var(--bg-1), var(--bg-2));
    }

    .login-card {
      width: min(94vw, 430px);
      background: var(--card);
      border: 1px solid rgba(255, 255, 255, 0.3);
      border-radius: 18px;
      box-shadow: 0 24px 50px rgba(2, 6, 23, 0.35);
      padding: 2rem;
      backdrop-filter: blur(4px);
    }

    .brand {
      display: inline-block;
      margin-bottom: 0.7rem;
      font-size: 0.8rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      color: var(--primary);
      text-transform: uppercase;
    }

    h1 {
      margin: 0;
      font-size: 1.75rem;
    }

    .subtitle {
      margin: 0.45rem 0 1.4rem;
      color: var(--muted);
      font-size: 0.95rem;
    }

    form { display: grid; gap: 0.95rem; }

    label {
      display: inline-block;
      margin-bottom: 0.4rem;
      font-size: 0.9rem;
      font-weight: 600;
    }

    input[type="email"],
    input[type="password"] {
      width: 100%;
      padding: 0.78rem 0.85rem;
      border: 1px solid var(--border);
      border-radius: 10px;
      font-size: 0.97rem;
      transition: border-color .2s ease, box-shadow .2s ease;
    }

    input:focus {
      outline: none;
      border-color: var(--primary);
      box-shadow: 0 0 0 4px var(--ring);
    }

    .actions {
      margin-top: 0.1rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 0.8rem;
      font-size: 0.88rem;
    }

    .remember {
      display: inline-flex;
      align-items: center;
      gap: 0.45rem;
      color: #334155;
      font-weight: 500;
    }

    .actions a {
      color: var(--primary);
      text-decoration: none;
      font-weight: 600;
    }

    .actions a:hover { text-decoration: underline; }

    button {
      border: 0;
      border-radius: 10px;
      background: linear-gradient(135deg, var(--primary), #3b82f6);
      color: #fff;
      padding: 0.82rem;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      transition: transform .15s ease, box-shadow .2s ease, background .2s ease;
    }

    button:hover {
      background: linear-gradient(135deg, var(--primary-hover), var(--primary));
      box-shadow: 0 10px 20px rgba(37, 99, 235, 0.3);
      transform: translateY(-1px);
    }

    .register {
      margin: 1rem 0 0;
      text-align: center;
      font-size: 0.9rem;
      color: var(--muted);
    }

    .register a {
      color: var(--success);
      text-decoration: none;
      font-weight: 700;
    }

    .register a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <main class="login-card">
    <span class="brand">Company Portal</span>
    <h1>Accedi al tuo account</h1>
    <p class="subtitle">Inserisci le tue credenziali per continuare in area riservata.</p>

    <form action="#" method="post">
      <div>
        <label for="email">Email aziendale</label>
        <input id="email" name="email" type="email" autocomplete="username" placeholder="nome@azienda.it" required />
      </div>

      <div>
        <label for="password">Password</label>
        <input id="password" name="password" type="password" autocomplete="current-password" placeholder="••••••••" required />
      </div>

      <div class="actions">
        <label class="remember"><input type="checkbox" name="remember" /> Ricordami</label>
        <a href="#">Password dimenticata?</a>
      </div>

      <button type="submit">Accedi</button>
    </form>

    <p class="register">Non hai un account? <a href="#">Richiedi accesso</a></p>
  </main>
</body>
</html>
