<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FastFood - Login</title>
  <link rel="stylesheet" href="fastfood/css/style.css">
</head>
<body class="auth-page login-page">
  <main class="auth-shell">
    <section class="auth-card login-card" aria-labelledby="login-title">
      <div class="auth-intro">
        <p class="auth-eyebrow">Bentornato su FastFood</p>
        <h1 id="login-title">Accedi al tuo profilo</h1>
        <p>
          Inserisci le credenziali e scegli il tipo di utenza per aprire l'area corretta:
          cliente per ordinare o ristoratore per gestire il tuo locale.
        </p>
      </div>

      <form class="auth-form" id="login-form" action="fastfood/client-home.html" method="get">
        <label for="email">Email</label>
        <input id="email" name="email" type="email" placeholder="nome@email.com" required>

        <label for="password">Password</label>
        <input id="password" name="password" type="password" placeholder="La tua password" required>

        <fieldset class="role-selector">
          <legend>Tipologia di utenza</legend>
          <label class="role-option role-option-client">
            <input type="radio" name="role" value="cliente" data-target="fastfood/client-home.html" checked>
            <span>
              <strong>Cliente</strong>
              <small>Ordina dai ristoranti vicini</small>
            </span>
          </label>
          <label class="role-option role-option-owner">
            <input type="radio" name="role" value="ristoratore" data-target="fastfood/owner-home.html">
            <span>
              <strong>Ristoratore</strong>
              <small>Gestisci menu e ordini</small>
            </span>
          </label>
        </fieldset>

        <button class="auth-submit auth-submit-wide" type="submit">Accedi</button>
      </form>

      <p class="auth-switch">
        Non hai ancora un account? <a href="signin.html">Registrati qui</a>
      </p>
    </section>
  </main>
  <script>
    (() => {
      const loginForm = document.querySelector('#login-form');
      const roleInputs = loginForm.querySelectorAll('input[name="role"]');

      loginForm.addEventListener('submit', () => {
        const selectedRole = loginForm.querySelector('input[name="role"]:checked');
        loginForm.action = selectedRole.dataset.target;
      });

      roleInputs.forEach((roleInput) => {
        roleInput.addEventListener('change', () => {
          if (roleInput.checked) {
            loginForm.action = roleInput.dataset.target;
          }
        });
      });
    })();
  </script>
</body>
</html>
