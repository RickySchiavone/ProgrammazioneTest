<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login</title>
  <style>
    :root {
      color-scheme: light;
      font-family: Arial, Helvetica, sans-serif;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: linear-gradient(135deg, #f4f6ff, #e9efff);
      color: #1f2937;
    }

    .login-card {
      width: min(92vw, 400px);
      background: #ffffff;
      border-radius: 14px;
      box-shadow: 0 10px 30px rgba(15, 23, 42, 0.12);
      padding: 2rem;
    }

    h1 {
      margin-top: 0;
      margin-bottom: 1.2rem;
      font-size: 1.7rem;
      text-align: center;
    }

    form {
      display: grid;
      gap: 0.9rem;
    }

    label {
      font-size: 0.9rem;
      font-weight: 600;
    }

    input {
      width: 100%;
      padding: 0.7rem 0.8rem;
      border: 1px solid #d1d5db;
      border-radius: 8px;
      font-size: 1rem;
      outline: none;
    }

    input:focus {
      border-color: #4f46e5;
      box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.18);
    }

    .actions {
      margin-top: 0.3rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 0.9rem;
    }

    .actions a {
      color: #4f46e5;
      text-decoration: none;
    }

    .actions a:hover {
      text-decoration: underline;
    }

    button {
      margin-top: 0.2rem;
      border: 0;
      border-radius: 8px;
      background: #4f46e5;
      color: #fff;
      padding: 0.75rem;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
    }

    button:hover {
      background: #4338ca;
    }
  </style>
</head>
<body>
  <main class="login-card">
    <h1>Accedi</h1>
    <form action="#" method="post">
      <div>
        <label for="email">Email</label>
        <input id="email" name="email" type="email" autocomplete="username" placeholder="nome@esempio.com" required />
      </div>

      <div>
        <label for="password">Password</label>
        <input id="password" name="password" type="password" autocomplete="current-password" placeholder="Inserisci la password" required />
      </div>

      <div class="actions">
        <label><input type="checkbox" name="remember" /> Ricordami</label>
        <a href="#">Password dimenticata?</a>
      </div>

      <button type="submit">Login</button>
    </form>
  </main>
</body>
</html>
